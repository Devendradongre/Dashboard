<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <section class="allelem">
            <div class="elem">
                <img src="https://plus.unsplash.com/premium_photo-1675598447271-78cff153765c?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8M2QlMjBiZ3xlbnwwfHwwfHx8MA%3D%3D"
                    alt="">
                <h1>To Do List</h1>
            </div>
            <div class="elem">
                <img src="https://images.unsplash.com/photo-1690692322909-f584597a7eeb?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8M2QlMjBiZ3xlbnwwfHwwfHx8MA%3D%3D"
                    alt="">
                <h1>Daily Planner</h1>
            </div>
            <div class="elem">
                <img src="https://plus.unsplash.com/premium_photo-1675556808874-c780b08f688a?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8M2QlMjBiZ3xlbnwwfHwwfHx8MA%3D%3D"
                    alt="">
                <h1>Motivational Quotes</h1>
            </div>
            <div class="elem">
                <img src="https://plus.unsplash.com/premium_photo-1670740680708-3df023665744?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fDNkJTIwYmd8ZW58MHx8MHx8fDA%3D"
                    alt="">
                <h1>Pomadoro Timer</h1>
            </div>
            <div class="elem">
                <img src="https://images.unsplash.com/photo-1601315488950-3b5047998b38?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8M2R8ZW58MHx8MHx8fDA%3D"
                    alt="">
                <h1>Daily Goals</h1>
            </div>
        </section>
        <section class="fullelem Task-list-fullelem">
            <button class="back">Close</button>
            <h1>your prasnalised Task list</h1>
            <div class="Task-Container">
                <div class="add-task">
                    <form>
                        <input type="text" placeholder="Enter Task">
                        <textarea placeholder="Enter detail ..." name="" id=""></textarea>
                        <button>Add Task</button>
                    </form>
                </div>
                <div class="all-task">

                </div>
            </div>
        </section>
        <section class="fullelem Daily-planer-fullelem">
            <button class="back">Close</button>
            <h1>Daily Planner</h1>
            <div class="pcontainer">
                <div class="fullplaner">
                    <div class="planer-inputcontainer">
                        <h1>Hey What's up write your plan here</h1>
                        <form class="form">
                            <input type="text" placeholder="Hey,Whats your plan !" id="task-input" required><br>
                            <input type="time" name="" id="task-time" required><br>
                            <button class="savebtn">Save</button>
                            <!-- <hr> -->
                        </form>
                    </div>
                    <div class="planer-container">
                    </div>
                </div>
            </div>
        </section>
        <section class="fullelem Motivational-Quotes-fullelem">
            <button class="back">Close</button>
            <h1>Motivational Quotes</h1>
            <div class="container">
                <div class="Quat-container">
                <div class="Quat">
                    
                </div>
            </div>
            </div>
        </section>
        <section class="fullelem Pomadoro-timer-fullelem">
            <button class="back">Close</button>
            <h1>Pomodoro Timer</h1>
        </section>
        <section class="fullelem Daily-goals-fullelem">
            <button class="back">Close</button>
            <h1>Daily Goals</h1>
        </section>
    </div>
    <script src="script.js"></script>
</body>

</html>
